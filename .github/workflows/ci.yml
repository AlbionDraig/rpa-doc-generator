name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (syntax and critical checks)
        run: |
          ruff check --select E9,F63,F7,F82 app tests

      - name: Run tests with coverage gate
        run: |
          python -m coverage erase
          python -m coverage run -m pytest tests -q
          python -m coverage report --fail-under=90 -m
          python -m coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Dependency vulnerability audit (non-blocking)
        continue-on-error: true
        run: |
          pip-audit --progress-spinner off
